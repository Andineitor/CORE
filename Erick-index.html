<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vista Plana</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f5f5f5; /* Color de fondo suave */
        }

        header {
            background-color: #ffffff; /* Fondo blanco para el header */
            padding: 10px;
            text-align: center;
            box-shadow: none; /* Sin sombras */
        }

        main {
            padding: 20px;
            background-color: #ffffff; /* Fondo blanco para el contenido principal */
            border: none; /* Sin bordes */
            margin: 20px;
            box-shadow: none;
        }

        footer {
            background-color: #ffffff;
            padding: 10px;
            text-align: center;
            box-shadow: none;
        }

        h1 {
            font-size: 24px;
            color: #333333;
        }

        p {
            font-size: 16px;
            color: #555555;
        }
    </style>
</head>
<body>

    <header>
        <h1>Bienvenido Mi nombre es Erick Palomo</h1>
    </header>

    <main>
        <p>Este es un diseño simple sin efectos visuales complejos, bordes redondeados o sombras. El enfoque está en la simplicidad.</p>
    </main>

    <footer>
        <p>&copy; 2025 Todos los derechos reservados.</p>
    </footer>

</body>
</html>
